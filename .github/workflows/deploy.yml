name: Production-Grade Self-Healing Deployment

on:
  push:
    branches: [ main ]

env:
  ECR_REPOSITORY: secure-app
  AWS_REGION: ap-southeast-2
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push the Image
        run: |
          REGISTRY_URL="337405469571.dkr.ecr.ap-southeast-2.amazonaws.com"
          REPO_NAME="${{ env.ECR_REPOSITORY }}"
          TAG="${{ env.IMAGE_TAG }}"
          docker build --no-cache -t ${REGISTRY_URL}/${REPO_NAME}:${TAG} .
          docker push ${REGISTRY_URL}/${REPO_NAME}:${TAG}

      - name: Copy docker-compose.yml & nginx.conf to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml, nginx.conf"
          target: "~/"

      - name: Execute Smart Blue-Green Switchover
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 337405469571.dkr.ecr.ap-southeast-2.amazonaws.com

            cd ~
            docker-compose pull

            # 🧠 SMART DETECTION: Ask Docker directly if version 1 is running instead of parsing text files
            if docker ps --format '{{.Names}}' | grep -q "app-version1.0"; then
              CURRENT_TARGET="app-v1"
              NEW_TARGET="app-v2"
              OLD_CONTAINER="app-version1.0"
              NEW_CONTAINER="app-version2.0"
              NEW_PORT="7002"
            else
              CURRENT_TARGET="app-v2"
              NEW_TARGET="app-v1"
              OLD_CONTAINER="app-version2.0"
              NEW_CONTAINER="app-version1.0"
              NEW_PORT="7001"
            fi

            echo "Target Switch identified: Deploying $NEW_TARGET to replace $CURRENT_TARGET"

            # Spin up the new container version
            docker-compose up -d $NEW_TARGET

            # Health probe validation loop
            SUCCESS=false
            for i in {1..12}; do
              if curl -f http://localhost:${NEW_PORT}/health > /dev/null 2>&1; then
                SUCCESS=true
                break
              fi
              sleep 5
            done

            if [ "$SUCCESS" = true ]; then
              # Alter configuration state locally on disk
              cp nginx.conf nginx.conf.tmp
              sed -i "s/proxy_pass http:\/\/$CURRENT_TARGET:7000;/proxy_pass http:\/\/$NEW_TARGET:7000;/g" nginx.conf.tmp
              
              # Safely overwrite Nginx configuration on disk cleanly
              mv nginx.conf.tmp nginx.conf

              # If Nginx container is up, safely instruct a reload hook, otherwise restart the service
              if docker ps --format '{{.Names}}' | grep -q "nginx-proxy-gateway"; then
                docker exec nginx-proxy-gateway nginx -s reload || docker-compose restart nginx
              else
                docker-compose up -d nginx
              fi

              # Wipe out the deprecated target footprint smoothly
              docker stop $OLD_CONTAINER || true
              docker rm -f $OLD_CONTAINER || true
              docker image prune -f
              echo "Deployment Success! Traffic redirected to $NEW_TARGET"
            else
              echo "Health Check Failed on $NEW_TARGET! Rolling back immediately."
              docker stop $NEW_CONTAINER || true
              docker rm -f $NEW_CONTAINER || true
              exit 1
            fi
